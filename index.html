<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web编程技术-音乐在线播放器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        实验2：音乐在线播放网站 | 开发人：24215220135_肖水宝 
    </div>

    <div class="player-container">
        <div class="record">
            <img src="img/record0.jpg" alt="封面" id="cover" class="cover">
        </div>
        
        <div class="song-info">
            <h2 id="title">歌曲加载中...</h2>
            <h3 id="artist"></h3>
        </div>

        <div class="progress-container" id="progress-container">
            <div class="progress" id="progress"></div>
        </div>
        <div class="time-display">
            <span id="current-time">00:00</span>
            <span id="duration">00:00</span>
        </div>

        <div class="controls">
            <button id="prev" class="btn" title="上一曲">
                <img src="img/上一首.png" alt="上一首">
            </button>
            <button id="play" class="btn play-btn" title="播放/暂停">
                <img src="img/继续播放.png" id="play-icon" alt="播放">
            </button>
            <button id="next" class="btn" title="下一曲">
                <img src="img/下一首.png" alt="下一首">
            </button>
            <button id="list-btn" class="btn" title="播放列表">
                <img src="img/列表.png" alt="列表">
            </button>
        </div>
    </div>

    <div class="playlist-container" id="playlist-container">
        <h3>播放列表</h3>
        <ul id="playlist"></ul>
    </div>

    <audio id="audio" src=""></audio>

    <script src="js/script.js"></script>
</body>
</html>
